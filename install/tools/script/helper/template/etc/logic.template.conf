<%!
    import common.project_utils as project
%>
; =========== logic configure ===========
[logic]
zone.id = ${project.get_global_option('global', 'zone_id', 0)} ; zone id
zone.step = ${project.get_global_option('global', 'type_step', 256)} ; zone step

server.open_service_time = ${project.get_global_option('global', 'zone_start_time', 0)}            ; open time if server not serve client fow now
server.maintenance_mode = 0             ; maintenance mode
server.resource.dir = ${project_install_prefix}/resource    ; resource directory

user.max_online = 20000                 ; max online number
user.default_openid = gm://system       ; default openid for system action

session.login_code_protect = 1200s      ; protect time when login failed
session.login_code_valid_sec = 600s     ; login code expire time
session.login_ban_time = 10800s         ; ban time when login event
session.tick_sec = 60s                  ; session event interval

task.stack.size = 524288                ; task stack size.(512KB)
task.csmsg.timeout = 8s                 ; csmsg task timeout
task.nomsg.timeout = 1800s              ; nomsg task timeout
task.paymsg.timeout = 300s              ; paymsg task timeout
task.stats.interval = 60s               ; stats log interval
task.stack.gc_once_number = 10          ; max recycle count of stacks when call gc
task.stack.pool_max_count = 25000       ; max stack can be allocated by stack pool
task.stack.mmap_count = 60000           ; check /proc/sys/vm/max_map_count when initialize(should be greater than max(busy_count, pool_max_count)*2+keep_count)
task.stack.busy_count = 20000           ; return busy to client when running task is too many
task.stack.keep_count = 10000           ; left some mmap segments for system
task.stack.busy_warn_count = 15000      ; print warning log when task number is greater than this

heartbeat.interval = 120s               ; heartbeat interval
heartbeat.tolerance = 20s               ; heartbeat network latency tolerance
heartbeat.error_times = 4               ; heartbeat error times to kickoff
heartbeat.ban_error_times = 3           ; heatbeat ban account of continue kickoff
heartbeat.ban_time_bound = 10800s       ; heartbeat ban time

router.cache_update_interval = 1800s    ; the interval to mark as expired for cache
router.cache_free_timeout = 600s        ; timeout for removing cache if not visited
router.object_free_timeout = 1500s      ; timeout for downgrade from object to cache if not visited
router.object_save_interval = 600s      ; saving interval for object
router.retry_max_ttl = 3                ; retry times if do some actions failed
router.detault_timer_interval = 300s    ; timer interval for checking the object or cache to see if it should be save, downgrade or removed
router.fast_timer_interval = 10s        ; timer interval for checking the object or cache when it's busy when first checked