# Default values for ranksvr.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

proc_name: ranksvr-settlementd

type_id: 14
type_name: "ranksvr-settlement"

image:
  repository: harbor.m-oa.com:6023/project-x/project-x-server/ranksvr-settlement
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: latest

volumeMounts:
  configMountPath: /data/projectx/gamesvr/cfg
  logMountPath: /data/projectx/gamesvr/log

vector:
  log_path: /data/projectx/gamesvr/log
  image:
    repository: harbor.m-oa.com:6023/vector/vector:latest
    pullPolicy: Always
  sliks:
    console:
      enable: false
    test_file:
      enable: false
    opensearch:
      enable: true
      username: project-Y-log-writer
      password: 11bo1B{OE,gjzZ4D
      endpoint: https://opensearch-cluster-master.devops.svc.cluster.local:9200/
  index:
    - "user_id"
    - "task_name"
    - "zone_id"
    - "response_code"

imagePullSecrets:
  - name: harbor-regcred

persistence:
  cbs:
    enabled: true
    storageClass: openebs-hostpath
    volumes:
      - name: log
        storage: 5Gi
        accessMode: ReadWriteOnce

gateway:
  class: cilium
  port: 7001
  hostname: gateway.example.com
  addresses_ip: 127.0.0.1

httproute:
  port: 7001
  parentRefsName: project-x-tls-gateway

service:
  type: ClusterIP
  port: 7001
  targetPort: 7001
  protocol: TCP

redis:
  enable: true

settle_interval: 60
settle_loop_count: 100
disable_rank_settlemnet_clear: false
