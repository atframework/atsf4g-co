syntax = "proto3";

package atframework.gateway;

option go_package = "github.com/atframework/atsf4g-go/atframework/service/atgateway/protocol";

option optimize_for = SPEED;
// option optimize_for = LITE_RUNTIME;
// option optimize_for = CODE_SIZE;
// --cpp_out=lite:,--cpp_out=
option cc_enable_arenas = true;

import "google/protobuf/duration.proto";

import "atframe/atapp_conf.proto";

message atgateway_listen_cfg {
  repeated string address = 1;
  string type = 2;
  uint64 max_client = 3 [(atframework.atapp.protocol.CONFIGURE) = { default_value: "65536" }];
  int32 backlog = 4 [(atframework.atapp.protocol.CONFIGURE) = { default_value: "1024" min_value: "1" }];
}

message atgateway_client_limit_cfg {
  uint64 total_send_bytes = 1 [(atframework.atapp.protocol.CONFIGURE) = { size_mode: true }];
  uint64 total_recv_bytes = 2 [(atframework.atapp.protocol.CONFIGURE) = { size_mode: true }];
  uint64 hour_send_bytes = 3 [(atframework.atapp.protocol.CONFIGURE) = { size_mode: true }];
  uint64 hour_recv_bytes = 4 [(atframework.atapp.protocol.CONFIGURE) = { size_mode: true }];
  uint64 minute_send_bytes = 5 [(atframework.atapp.protocol.CONFIGURE) = { size_mode: true }];
  uint64 minute_recv_bytes = 6 [(atframework.atapp.protocol.CONFIGURE) = { size_mode: true }];
  uint64 total_send_times = 7;
  uint64 total_recv_times = 8;
  uint64 hour_send_times = 9;
  uint64 hour_recv_times = 10;
  uint64 minute_send_times = 11;
  uint64 minute_recv_times = 12;
}

// Key exchange algorithm for the handshake
enum atgateway_key_exchange_type {
  EN_ATGW_KEY_EXCHANGE_NONE = 0 [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "none" case_sensitive: false }];
  EN_ATGW_KEY_EXCHANGE_X25519 = 1 [
    (atframework.atapp.protocol.ENUMVALUE) = { alias_name: "x25519" alias_name: "curve25519" case_sensitive: false }
  ];
  EN_ATGW_KEY_EXCHANGE_SECP256R1 = 2 [(atframework.atapp.protocol.ENUMVALUE) = {
    alias_name: "secp256r1"
    alias_name: "p-256"
    alias_name: "prime256v1"
    case_sensitive: false
  }];
  EN_ATGW_KEY_EXCHANGE_SECP384R1 = 3
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "secp384r1" alias_name: "p-384" case_sensitive: false }];
  EN_ATGW_KEY_EXCHANGE_SECP521R1 = 4
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "secp521r1" alias_name: "p-521" case_sensitive: false }];
}

// Crypto algorithm for session data encryption
enum atgateway_crypto_algorithm {
  EN_ATGW_CRYPTO_NONE = 0 [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "none" case_sensitive: false }];
  EN_ATGW_CRYPTO_XXTEA = 1 [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "xxtea" case_sensitive: false }];
  EN_ATGW_CRYPTO_AES_128_CBC = 11
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "aes-128-cbc" case_sensitive: false }];
  EN_ATGW_CRYPTO_AES_192_CBC = 12
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "aes-192-cbc" case_sensitive: false }];
  EN_ATGW_CRYPTO_AES_256_CBC = 13
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "aes-256-cbc" case_sensitive: false }];
  EN_ATGW_CRYPTO_AES_128_GCM = 14
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "aes-128-gcm" case_sensitive: false }];  // AEAD
  EN_ATGW_CRYPTO_AES_192_GCM = 15
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "aes-192-gcm" case_sensitive: false }];  // AEAD
  EN_ATGW_CRYPTO_AES_256_GCM = 16
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "aes-256-gcm" case_sensitive: false }];  // AEAD
  EN_ATGW_CRYPTO_CHACHA20 = 31
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "chacha20" case_sensitive: false }];
  EN_ATGW_CRYPTO_CHACHA20_POLY1305 = 32 [(atframework.atapp.protocol.ENUMVALUE) = {
    alias_name: "chacha20-poly1305"
    alias_name: "chacha20-poly1305-ietf"
    case_sensitive: false
  }];  // AEAD
  EN_ATGW_CRYPTO_XCHACHA20_POLY1305 = 33 [(atframework.atapp.protocol.ENUMVALUE) = {
    alias_name: "xchacha20-poly1305"
    alias_name: "xchacha20-poly1305-ietf"
    case_sensitive: false
  }];  // AEAD
}

// Compression algorithm for session data
enum atgateway_compression_algorithm {
  EN_ATGW_COMPRESSION_NONE = 0 [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "none" case_sensitive: false }];
  EN_ATGW_COMPRESSION_ZSTD = 10 [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "zstd" case_sensitive: false }];
  EN_ATGW_COMPRESSION_LZ4 = 20 [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "lz4" case_sensitive: false }];
  EN_ATGW_COMPRESSION_SNAPPY = 30
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "snappy" case_sensitive: false }];
  EN_ATGW_COMPRESSION_ZLIB = 40 [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "zlib" case_sensitive: false }];
}

// KDF algorithm for key derivation
enum atgateway_kdf_algorithm {
  EN_ATGW_KDF_HKDF_SHA256 = 0
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "hkdf-sha256" case_sensitive: false }];
}

message atgateway_client_crypto_cfg {
  // Access tokens for HMAC-SHA256 authentication (multiple for rolling rotation)
  repeated bytes access_tokens = 1;

  // Key refresh interval (re-run handshake to rotate keys)
  google.protobuf.Duration update_interval = 2
      [(atframework.atapp.protocol.CONFIGURE) = { default_value: "300s" min_value: "1s" }];

  // Key exchange algorithm (ECDH curve)
  atgateway_key_exchange_type key_exchange = 3 [(atframework.atapp.protocol.CONFIGURE) = { default_value: "x25519" }];

  // Supported crypto algorithms (server selects the first mutually supported one)
  repeated atgateway_crypto_algorithm algorithms = 4;

  // Supported compression algorithms (server selects the first mutually supported one)
  repeated atgateway_compression_algorithm compression_algorithms = 5;

  // Supported KDF algorithms
  repeated atgateway_kdf_algorithm kdf_algorithms = 6;

  // Maximum post message size in bytes (default 2MB, sent to client during handshake)
  uint64 max_post_message_size = 7 [(atframework.atapp.protocol.CONFIGURE) = { default_value: "2MB" size_mode: true }];
}

enum atgateway_router_policy {
  EN_ATGW_ROUTER_POLICY_RANDOM = 0
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "random" case_sensitive: false }];
  EN_ATGW_ROUTER_POLICY_ROUND_ROBIN = 1
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "round_robin" case_sensitive: false }];
  EN_ATGW_ROUTER_POLICY_HASH = 2
      [(atframework.atapp.protocol.ENUMVALUE) = { alias_name: "hash" case_sensitive: false }];
}

message atgateway_router_cfg {
  uint64 node_id = 1;
  string node_name = 2;
  uint64 type_id = 3;
  string type_name = 4;

  atgateway_router_policy policy = 11;
  atframework.atapp.protocol.atapp_metadata policy_selector = 12;
}

message atgateway_client_cfg {
  google.protobuf.Duration reconnect_timeout = 1
      [(atframework.atapp.protocol.CONFIGURE) = { default_value: "180s" min_value: "1s" }];
  google.protobuf.Duration first_idle_timeout = 2
      [(atframework.atapp.protocol.CONFIGURE) = { default_value: "10s" min_value: "1s" }];
  uint64 recv_buffer_size = 3 [(atframework.atapp.protocol.CONFIGURE) = { default_value: "2MB" size_mode: true }];
  uint64 send_buffer_size = 4 [(atframework.atapp.protocol.CONFIGURE) = { default_value: "4MB" size_mode: true }];
  atgateway_router_cfg default_router = 5;
  atgateway_client_limit_cfg limit = 11;
  atgateway_client_crypto_cfg crypto = 12;
}

message atgateway_cfg {
  atgateway_listen_cfg listen = 1;
  atgateway_client_cfg client = 2;

  bool echo_server = 3;  // Let atgateway act as an echo server for testing (echoes back any received message)
}
